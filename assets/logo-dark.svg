      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <rect x="8" y="8" width="64" height="64" rx="14" fill="url(#grad)" />

    <rect x="0" y="28" width="12" height="3" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="0" y="49" width="12" height="3" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="68" y="28" width="12" height="3" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="68" y="49" width="12" height="3" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="28" y="0" width="3" height="12" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="49" y="0" width="3" height="12" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="28" y="68" width="3" height="12" rx="1.5" fill="url(#grad2)" opacity="0.8"/>
    <rect x="49" y="68" width="3" height="12" rx="1.5" fill="url(#grad2)" opacity="0.8"/>

    <circle cx="30" cy="30" r="4" fill="white" opacity="0.95"/>
    <circle cx="50" cy="30" r="4" fill="white" opacity="0.95"/>
    <circle cx="40" cy="45" r="5" fill="white" opacity="0.95"/>
    <circle cx="28" cy="55" r="3.5" fill="white" opacity="0.85"/>
    <circle cx="52" cy="55" r="3.5" fill="white" opacity="0.85"/>

    <line x1="30" y1="30" x2="40" y2="45" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="50" y1="30" x2="40" y2="45" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="40" y1="45" x2="28" y2="55" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="45" x2="52" y2="55" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="30" x2="50" y2="30" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="28" y1="55" x2="52" y2="55" stroke="white" stroke-width="1.3" opacity="0.35"/>
