<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 320px; padding: 16px; background: #f8f9fb; color: #1a1d23; }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 span { color: #4f46e5; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b90a0; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #e2e5ea; border-radius: 6px; font-size: 13px; background: white; }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px #eef2ff; }
    button { width: 100%; margin-top: 16px; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
    .status { margin-top: 12px; font-size: 12px; color: #5a6070; text-align: center; }
    .status.ok { color: #16a34a; }
    .status.err { color: #dc2626; }
    .hint { font-size: 11px; color: #8b90a0; margin-top: 8px; }
  </style>
</head>
<body>
  <h1><span>●</span> PonderDB</h1>

  <label>Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://127.0.0.1:7437">

  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="pndr_...">

  <label>Project ID (optional)</label>
  <input type="text" id="projectId" placeholder="my-project">

  <button id="save">Save Settings</button>
  <div id="status" class="status"></div>

  <p class="hint">Right-click selected text on any page → "Save to PonderDB"</p>

  <script src="src/popup.js"></script>
</body>
</html>
