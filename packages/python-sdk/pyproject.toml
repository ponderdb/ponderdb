[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ponderdb"
version = "0.2.1"
description = "PonderDB Python SDK — programmatic access to PonderDB memory server"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["httpx>=0.25.0"]
authors = [{name = "PonderDB"}]
urls = {Homepage = "https://github.com/ponderdb/ponderdb", Repository = "https://github.com/ponderdb/ponderdb"}
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Topic :: Software Development :: Libraries",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21"]
