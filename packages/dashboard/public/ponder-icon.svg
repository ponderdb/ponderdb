<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- PonderDB Icon (standalone, square) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="trace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" />

  <!-- Circuit traces from edges -->
  <rect x="24" y="185" width="68" height="18" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="24" y="309" width="68" height="18" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="420" y="185" width="68" height="18" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="420" y="309" width="68" height="18" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="185" y="24" width="18" height="68" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="309" y="24" width="18" height="68" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="185" y="420" width="18" height="68" rx="9" fill="url(#trace)" opacity="0.7"/>
  <rect x="309" y="420" width="18" height="68" rx="9" fill="url(#trace)" opacity="0.7"/>

  <!-- Neural nodes -->
  <circle cx="200" cy="190" r="28" fill="white" opacity="0.95"/>
  <circle cx="312" cy="190" r="28" fill="white" opacity="0.95"/>
  <circle cx="256" cy="275" r="34" fill="white" opacity="0.95"/>
  <circle cx="185" cy="345" r="24" fill="white" opacity="0.85"/>
  <circle cx="327" cy="345" r="24" fill="white" opacity="0.85"/>

  <!-- Neural connections -->
  <line x1="200" y1="190" x2="256" y2="275" stroke="white" stroke-width="12" opacity="0.5" stroke-linecap="round"/>
  <line x1="312" y1="190" x2="256" y2="275" stroke="white" stroke-width="12" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="275" x2="185" y2="345" stroke="white" stroke-width="10" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="275" x2="327" y2="345" stroke="white" stroke-width="10" opacity="0.4" stroke-linecap="round"/>
  <line x1="200" y1="190" x2="312" y2="190" stroke="white" stroke-width="10" opacity="0.35" stroke-linecap="round"/>
  <line x1="185" y1="345" x2="327" y2="345" stroke="white" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
</svg>
