name: Publish to npm

on:
  push:
    branches: [production]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      # Determine version bump type from commit messages
      # "feat:" = minor, "fix:" = patch, "BREAKING CHANGE" = major
      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git log ${LAST_TAG}..HEAD --oneline 2>/dev/null || git log --oneline)

          if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qi "^[a-f0-9]* feat"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
          echo "Bump type: $(grep type $GITHUB_OUTPUT | cut -d= -f2)"

      # Bump version in all packages
      - name: Bump versions
        run: |
          BUMP=${{ steps.bump.outputs.type }}

          # Get current version from core
          CURRENT=$(node -p "require('./packages/core/package.json').version")

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "Bumping $CURRENT -> $NEW_VERSION ($BUMP)"

          # Update all package versions
          for pkg in core sqlite-store server sdk cli; do
            sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" packages/$pkg/package.json
          done

          # Update internal dependency versions
          sed -i "s/\"@ponderdb\/core\": \"$CURRENT\"/\"@ponderdb\/core\": \"$NEW_VERSION\"/" packages/sqlite-store/package.json packages/server/package.json packages/sdk/package.json
          sed -i "s/\"@ponderdb\/sqlite-store\": \"$CURRENT\"/\"@ponderdb\/sqlite-store\": \"$NEW_VERSION\"/" packages/server/package.json
          sed -i "s/\"@ponderdb\/sdk\": \"$CURRENT\"/\"@ponderdb\/sdk\": \"$NEW_VERSION\"/" packages/cli/package.json

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # Publish all packages in dependency order
      - name: Publish to npm
        run: |
          npm publish --workspace=@ponderdb/core --access public
          npm publish --workspace=@ponderdb/sqlite-store --access public
          npm publish --workspace=@ponderdb/sdk --access public
          npm publish --workspace=@ponderdb/server --access public
          npm publish --workspace=@ponderdb/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Commit version bump and tag
      - name: Commit and tag
        run: |
          NEW_VERSION=${{ steps.bump.outputs.version || '0.0.0' }}
          # Re-read in case step output didn't work
          if [ "$NEW_VERSION" = "0.0.0" ]; then
            NEW_VERSION=$(node -p "require('./packages/core/package.json').version")
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: release v${NEW_VERSION}" || true
          git tag "v${NEW_VERSION}"
          git push
          git push --tags

          # Sync version back to staging and main
          git checkout staging
          git merge production --no-edit
          git push
          git checkout main
          git merge staging --no-edit
          git push
