name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: rm -f package-lock.json && npm install
      - name: Build in dependency order
        run: |
          npm run build -w @ponderdb/core
          npm run build -w @ponderdb/sqlite-store -w @ponderdb/pg-store -w @ponderdb/sdk
          npm run build -w @ponderdb/server -w @ponderdb/cli
          npm run build --workspaces --if-present
      - run: npm run lint

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/ponderdb
            bash deploy/deploy.sh production
