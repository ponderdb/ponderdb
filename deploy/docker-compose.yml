version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: ponderdb-postgres
    restart: always
    environment:
      POSTGRES_DB: ponderdb
      POSTGRES_USER: ponderdb
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ponderdb_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ponderdb-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7437:7437"
    env_file:
      - ../.env.production
    environment:
      DATABASE_URL: postgresql://ponderdb:${DB_PASSWORD:-ponderdb_secret}@db:5432/ponderdb
    volumes:
      - appdata:/var/lib/ponderdb

volumes:
  pgdata:
  appdata:
